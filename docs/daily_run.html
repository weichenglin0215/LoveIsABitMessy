<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI生成日記 - LoveIsABitMessy</title>
    <link rel="stylesheet" href="css/lpas_styles.css">
    <!-- 中央角色資料與邏輯 -->
    <script src="js/character_logic.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/model_options_app.js" defer></script>
    <script src="js/writer_settings_app.js" defer></script>
    <style>
        body {
            display: block;
            background-color: var(--c-bg-main);
            padding: 20px;
            color: white;
            overflow-y: auto;
            height: auto;
        }

        .debug-panel {
            max-width: 1800px;
            margin: 0 auto;
            background: var(--c-bg-card);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #444;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .col-left {
            border-right: 1px solid #444;
            padding-right: 20px;
        }

        .col-right {
            display: flex;
            flex-direction: column;
        }

        .editor-section {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .form-section {
            margin-bottom: 3px;
            padding-bottom: 3px;
        }

        .form-label {
            display: block;
            margin-top: 8px;
            margin-bottom: 2px;
            color: var(--c-accent-light);
            font-weight: 500;
        }

        select,
        input {
            width: 100%;
            padding: 5px;
            background: #000;
            border: 1px solid hsl(0, 0%, 33%);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-size: 1.0rem;
        }

        textarea {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid hsl(0, 0%, 33%);
            border-radius: 8px;
            color: #fff;
            font-size: 1.3rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            line-height: 1.6;
        }

        .btn-row {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .ai-btn-container {
            padding: 0px 12px;
        }

        .ai-btn {
            padding: 0px 12px;
            border-radius: 15px;
            border: 1px solid #f472b6;
            background: rgba(244, 114, 182, 0.1);
            color: #f472b6;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .ai-btn:hover {
            background: #f472b6;
            color: #fff;
        }

        .btn {
            padding: 3px 10px;
            font-size: 1.2rem;
            margin: 10px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .primary-btn {
            border: 1px solid var(--c-accent-light);
            background: var(--c-accent);
            /*background: linear-gradient(135deg, var(--c-accent) 0%, var(--c-accent-dark) 100%);*/
            color: hsl(0, 0%, 100%);
        }

        .primary-btn:hover:not(:disabled) {
            /*background: linear-gradient(135deg, var(--c-accent-hover) 0%, var(--c-accent-dark) 100%);*/
            background: var(--c-accent-hover);
            color: hsl(0, 0%, 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--c-accent-vivian);
        }

        .primary-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .secondary-btn {
            border: 1px solid var(--c-secondary-accent-light);
            background: var(--c-secondary-accent);
            color: hsl(0, 0%, 100%);
        }

        .secondary-btn:hover:not(:disabled) {
            background: var(--c-secondary-accent-hover);
            color: hsl(0, 0%, 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--c-secondary-accent-vivian);
        }

        .secondary-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .log-area {
            background: #000;
            color: hsl(120, 50%, 70%);
            font-family: 'Courier New', monospace;
            padding: 10px;
            border-radius: 8px;
            height: 600px;
            overflow-y: scroll;
            white-space: pre-wrap;
            font-size: 1.2rem;
            border: 1px solid #333;
        }

        .prompt-preview {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 8px;
            color: #aaa;
            font-size: 1rem;
            margin-top: 5px;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .toggle-row input[type="checkbox"] {
            width: auto;
            margin: 0;
            accent-color: var(--c-accent);
            transform: scale(1.3);
            cursor: pointer;
        }

        .toggle-row label {
            color: var(--c-text-sec);
            font-size: 1rem;
            cursor: pointer;
            user-select: none;
        }

        .cloud-status {
            font-size: 0.85rem;
            color: var(--c-text-sec);
            margin-top: 5px;
        }

        .server-status-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .server-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .server-status-dot.online {
            background: #4caf50;
            box-shadow: 0 0 8px #4caf50;
        }

        .server-status-dot.flash {
            animation: dot-flash 0.5s ease-out;
        }

        @keyframes dot-flash {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.4);
            }

            100% {
                transform: scale(1);
            }
        }

        .server-status-dot.offline {
            background: #f44336;
            box-shadow: 0 0 6px #f44336;
        }

        .server-status-text {
            font-size: 1rem;
            color: var(--c-text-sec);
        }

        #start-server-btn {
            padding: 8px 18px;
            font-size: 1rem;
            margin-top: 0;
            background: #2a1a3e;
            border: 1px solid var(--c-accent);
            color: var(--c-accent-light);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #start-server-btn:hover:not(:disabled) {
            background: var(--c-accent-hover);
            color: #fff;
        }

        #start-server-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .status-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #444;
        }

        .status-item label {
            display: block;
            font-size: 1rem;
            color: var(--c-text-sec);
            margin-bottom: 5px;
        }

        .status-item select {
            margin-bottom: 0;
            padding: 5px 10px;
            font-size: 1rem;
        }

        .copy-btn {
            float: right;
            background: rgba(255, 255, 255, 0.1);
            color: #ddd;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 5px;
        }

        .copy-btn:hover {
            background: var(--c-accent-light);
            color: #000;
        }

        .reload-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 10px;
            font-size: 1rem;
        }

        .reload-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .personality-type-tag {
            display: inline-block;
            background: rgba(156, 111, 214, 0.2);
            color: var(--c-accent-light);
            border: 1px solid rgba(156, 111, 214, 0.4);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 1rem;
            margin-top: 5px;
            font-family: monospace;
        }
    </style>
</head>

<body>
    <div class="debug-panel">
        <div class="col-left">
            <h2 style="font-weight: 500; margin-bottom: 5px; color: var(--c-accent-light);">🎭 AI
                生成日記</h2>
            <p style="color: var(--c-text-sec); font-size: 1rem; margin-bottom: 15px;">
                挑選角色，填寫情境 (Scenario)，點擊【AI生成：日記與插圖】按鈕，自動生成日記，ComfyUI 繪製專屬插圖。
            </p>

            <div class="form-section"
                style="background: rgba(255,255,255,0.05); padding: 5px 10px; border-radius: 12px; margin-bottom: 10px;">
                <label class="form-label" style="margin-top:0;">📂 日記專案管理 (雲端)</label>
                <div style="display: flex; gap: 8px; margin-bottom: 5px; align-items: center;">
                    <input type="text" id="project-id" placeholder="專案 ID (唯讀)" readonly
                        style="flex: 1.2; opacity: 0.8;">
                    <button class="btn secondary-btn" id="btn-load-project" style="flex: 1;">讀取專案</button>
                    <button class="btn primary-btn" id="btn-save-new-project" style="flex: 1;">儲存新專案...</button>
                    <button class="btn primary-btn" id="btn-save-project" style="flex: 1;">儲存專案(更新)</button>
                </div>
                <select id="project-select"
                    style="display: none; margin-bottom: 10px; border: 1px solid var(--c-accent);"></select>
            </div>

            <div class="form-section">
                <label class="form-label">1. 選擇演員</label>
                <div class="toggle-row">
                    <input type="checkbox" id="use-local-data">
                    <label for="use-local-data">讀取本機資料 (除錯用)...</label>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 5px;">
                    <div class="status-item">
                        <label class="form-label">主角演員</label>
                        <div style="display: flex; gap: 8px;">
                            <select id="char-select" style="flex: 1;"></select>
                            <button class="reload-btn" onclick="initCharacters()">🔄</button>
                        </div>
                    </div>
                    <div class="status-item">
                        <label class="form-label">閨密 A (演員)</label>
                        <select id="bestie-a-select" class="bestie-select">
                            <option value="">-- 無 --</option>
                        </select>
                    </div>
                    <div class="status-item">
                        <label class="form-label">閨密 B (演員)</label>
                        <select id="bestie-b-select" class="bestie-select">
                            <option value="">-- 無 --</option>
                        </select>
                    </div>
                    <div class="status-item">
                        <label class="form-label">閨密 C (演員)</label>
                        <select id="bestie-c-select" class="bestie-select">
                            <option value="">-- 無 --</option>
                        </select>
                    </div>
                </div>
                <div id="char-personality-type-display" class="personality-type-tag" style="display:none;"></div>
                <div id="char-source-status" class="cloud-status">☁️ 預設讀取雲端角色卡</div>

                <div class="status-row">
                    <div class="status-item">
                        <label>🎭 伴侶狀態</label>
                        <select id="partner-status">
                            <option value="曖昧期">曖昧期</option>
                            <option value="戀愛期" selected>戀愛期</option>
                            <option value="失戀期">失戀期</option>
                        </select>
                    </div>
                    <div class="status-item">
                        <label>👋 新朋友 A 狀態</label>
                        <select id="friend-a-status">
                            <option value="無" selected>無</option>
                            <option value="曖昧期">曖昧期</option>
                            <option value="戀愛期">戀愛期</option>
                            <option value="失戀期">失戀期</option>
                        </select>
                    </div>
                    <div class="status-item">
                        <label>👋 新朋友 B 狀態</label>
                        <select id="friend-b-status">
                            <option value="無" selected>無</option>
                            <option value="曖昧期">曖昧期</option>
                            <option value="戀愛期">戀愛期</option>
                            <option value="失戀期">失戀期</option>
                        </select>
                    </div>
                    <div class="toggle-row">
                        <input type="checkbox" id="others-have-partner">
                        <label for="others-have-partner">伴侶或新朋友已有對象</label>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <label class="form-label">2. 日期 / 時間</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="date" id="diary-date">
                    <select id="diary-time">
                        <option value="19">晚上 7 點</option>
                        <option value="20">晚上 8 點</option>
                        <option value="21">晚上 9 點</option>
                        <option value="22">晚上 10 點</option>
                        <option value="23">晚上 11 點</option>
                        <option value="00" selected>凌晨 0 點</option>
                    </select>
                </div>
            </div>

            <div class="form-section">
                <label class="form-label">2. 設定情境 (Scenario)</label>
                <textarea id="input-scenario" placeholder="例如：雨天的咖啡廳..." style="height: 300px;"></textarea>
            </div>

            <div class="form-section">
                <label class="form-label">3. 產生日記的AI提示詞(唯讀)</label>
                <textarea id="diary-prompt-box" readonly class="prompt-preview" style="min-height:100px;"></textarea>
            </div>

            <div class="form-section">
                <label class="form-label">4. 產生照片的AI提示詞(唯讀)</label>
                <textarea id="image-prompt-box" readonly class="prompt-preview" style="min-height:60px;"></textarea>
            </div>

            <div class="ai-btn-container">
                <button class="ai-btn" id="run-btn">🎭AI生成：日記與插圖</button>
            </div>

            <div class="server-status-row" style="margin-top:20px; flex-wrap: wrap;">
                <span class="server-status-dot offline" id="server-dot"></span>
                <span class="server-status-text" id="server-status-text">偵測中…</span>
                <button id="start-server-btn" disabled>🚀 請自行啟動伺服器</button>
                <div id="model-container" style=" gap:8px; opacity: 0.5; pointer-events: none;">
                    <label style="font-size:1rem; color:#aaa;">🤖 AI 模型：</label>
                    <select id="model-select" style="max-width: 300px; ">
                        <option value="gemma4">gemma4</option>
                    </select>
                </div>
                <div style="display:flex; align-items:center; gap:8px;">
                    <label style="font-size:1rem; color:#aaa;">⚙️ 模型參數：</label>
                    <select id="model-options-select" style="max-width: 200px;">
                        <option value="">預設</option>
                    </select>
                    <button id="btn-add-model-option" class="ai-btn" style="padding: 4px 10px; font-size: 0.9rem;">+編輯</button>
                </div>
                <div style="display:flex; align-items:center; gap:8px;">
                    <label style="font-size:1rem; color:#aaa;">🖋️ 寫作風格：</label>
                    <select id="writer-style-select" class="ws-style-dropdown" style="max-width: 200px;">
                        <option value="">無</option>
                    </select>
                    <button id="btn-edit-writer-style" class="ai-btn" style="padding: 4px 10px; font-size: 0.9rem;" onclick="WriterSettingsApp.openStyleModal(document.getElementById('writer-style-select').value)">+編輯</button>
                </div>
                <div style="display:flex; align-items:center; gap:8px;">
                    <label style="font-size:1rem; color:#aaa;">📝 寫作範本：</label>
                    <select id="writer-sample-select" class="ws-sample-dropdown" style="max-width: 200px;">
                        <option value="">無</option>
                    </select>
                    <button id="btn-edit-writer-sample" class="ai-btn" style="padding: 4px 10px; font-size: 0.9rem;" onclick="WriterSettingsApp.openSampleModal(document.getElementById('writer-sample-select').value)">+編輯</button>
                </div>
            </div>
            <div id="log-output" class="log-area" style="height: 300px; font-size: 1rem;">等待任務...</div>
            <div id="diary-cloud-status" class="cloud-status">雲端狀態</div>
        </div>

        <div class="col-right">
            <div class="editor-section">
                <h2
                    style="font-weight: 500; margin-bottom: 5px; color: var(--c-accent-light); display:flex; align-items:center; gap:8px;">
                    📝 日記修改與編輯區
                </h2>

                <div class="form-section">
                    <label class="form-label">載入現有日記 (雲端 / 本機)</label>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn secondary-btn" id="load-cloud-diaries-btn"
                            style="flex:1; padding: 6px; font-size:1.2rem;">☁️ 從雲端讀取清單</button>
                        <button class="btn secondary-btn" id="load-local-diaries-btn"
                            style="flex:1; padding: 6px; font-size:1.2rem;">📁 從本機讀取清單</button>
                    </div>
                    <select id="diary-select">
                        <option value="">-- 請先點選讀取按鈕 --</option>
                    </select>
                </div>

                <div class="form-section" style="flex:1; display:flex; flex-direction:column;">
                    <label class="form-label">日記文字內容 (Story)</label>
                    <textarea id="edit-diary-text" style="flex:1; min-height:300px;"></textarea>
                </div>

                <div class="form-section">
                    <label class="form-label">生圖提示詞 (Image Prompt)</label>
                    <textarea id="edit-image-prompt" style="height:60px;"></textarea>
                </div>

                <div class="btn-row">
                    <button class="btn primary-btn" id="save-diary-editor-btn">💾 儲存修改內容</button>
                    <div id="editor-status" class="cloud-status"></div>
                </div>

    <script>
        const logBox = document.getElementById('log-output');
        const charSelect = document.getElementById('char-select');
        const diaryPromptBox = document.getElementById('diary-prompt-box');
        const imagePromptBox = document.getElementById('image-prompt-box');
        const useLocalCheckbox = document.getElementById('use-local-data');
        const charSourceStatus = document.getElementById('char-source-status');
        const diaryCloudStatus = document.getElementById('diary-cloud-status');
        const serverDot = document.getElementById('server-dot');
        const serverStatusText = document.getElementById('server-status-text');
        const startServerBtn = document.getElementById('start-server-btn');

        // 記錄雲端角色清單
        let cloudCharacters = [];
        let serverOnline = false;

        // ====== 偵測 debug_server 是否在線 ======
        async function fetchOllamaModels() {
            try {
                const res = await fetch('http://localhost:8000/api/models');
                const container = document.getElementById('model-container');
                if (res.ok) {
                    const models = await res.json();
                    const select = document.getElementById('model-select');
                    const current = select.value;
                    select.innerHTML = "";
                    models.forEach(m => {
                        const opt = document.createElement('option');
                        opt.value = m;
                        opt.textContent = m;
                        if (m === current || m === 'gemma4') opt.selected = true;
                        select.appendChild(opt);
                    });
                    if (container) {
                        container.style.opacity = "1";
                        container.style.pointerEvents = "auto";
                    }
                } else {
                    console.warn("Could not fetch models from Ollama");
                    if (container) {
                        container.style.opacity = "0.5";
                        container.style.pointerEvents = "none";
                    }
                }
            } catch (e) {
                console.error("Failed to fetch models", e);
            }
        }

        let lastModelFetchTime = 0;

        async function checkServerStatus() {
            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 2000);
                const res = await fetch('http://localhost:8000/api/status', { signal: controller.signal });
                clearTimeout(timeout);
                if (res.ok) {
                    const now = Date.now();
                    if (!serverOnline) {
                        fetchOllamaModels();
                        // 如果是本機模式，連線後自動重新整理角色清單
                        if (document.getElementById('use-local-data').checked) loadLocalChars();
                        lastModelFetchTime = now;
                    } else {
                        // 如果伺服器在線，但模型清單還沒抓到或抓失敗，每 30 秒重試一次
                        const modelContainer = document.getElementById('model-container');
                        const modelSelect = document.getElementById('model-select');
                        const isModelInactive = modelContainer && modelContainer.style.opacity === "0.5";
                        const hasNoModels = modelSelect && modelSelect.options.length <= 1;
                        if ((isModelInactive || hasNoModels) && (now - lastModelFetchTime > 30000)) {
                            fetchOllamaModels();
                            lastModelFetchTime = now;
                        }
                    }
                    serverOnline = true;
                    serverDot.className = 'server-status-dot online';
                    // 閃爍效果
                    serverDot.classList.add('flash');
                    setTimeout(() => serverDot.classList.remove('flash'), 500);
                    serverStatusText.textContent = '✅ debug_server.py 運行中';
                    startServerBtn.disabled = true;
                    return true;
                }
            } catch (e) { }
            serverOnline = false;
            serverDot.className = 'server-status-dot offline';
            serverStatusText.textContent = '❌ debug_server.py 未啟動';
            startServerBtn.disabled = false;
            const modelContainer = document.getElementById('model-container');
            if (modelContainer) {
                modelContainer.style.opacity = "0.5";
                modelContainer.style.pointerEvents = "none";
            }
            return false;
        }

        // ====== 啟動伺服器按鈕 ======
        startServerBtn.addEventListener('click', () => {
            // 產生 bat 檔內容並觸發下載
            const batContent = '@echo off\r\nchcp 65001 >nul\r\ncd /d "' + getProjectRoot() + '"\r\necho ====================================\r\necho   LoveIsABitMessy - Debug Server\r\necho   http://localhost:8000\r\necho ====================================\r\necho.\r\npython debug_server.py\r\necho.\r\necho === 伺服器已停止 ===\r\npause >nul\r\n';
            const blob = new Blob([batContent], { type: 'application/bat' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'start_debug_server.bat';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

        async function loadCloudChars() {
            charSourceStatus.textContent = '☁️ 正在從雲端載入角色…';
            try {
                if (!window.SupabaseClient || !window.SupabaseClient.init || !window.SupabaseClient.init()) {
                    throw new Error('Supabase 未初始化（請確認 js/supabaseClient.js 中的 URL 和 Key 是否正確）');
                }
                const sb = window.SupabaseClient.getClient();
                const { data, error } = await sb
                    .from('characters')
                    .select('id, name, card_json, is_active, source, lpas, updated_at')
                    .eq('is_active', true)
                    .order('updated_at', { ascending: false });
                if (error) {
                    // 提供更友善的錯誤訊息
                    if (error.message && error.message.includes('schema cache')) {
                        throw new Error('資料表不存在。請先到 Supabase Dashboard → SQL Editor 執行 schema.sql 和 schema_add.sql');
                    }
                    throw error;
                }
                if (!data || data.length === 0) {

                charSelect.innerHTML = charOptions;

                    sel.innerHTML = '<option value="">-- 無 --</option>' + charOptions;
                });

                charSourceStatus.textContent = `✅ 已從雲端載入 ${data.length} 個角色`;
            } catch (e) {
                console.error('[Cloud] loadCloudChars failed:', e);

        // ====== 儲存日記至雲端 ======
        async function saveDiaryToCloud(jobResult) {
            if (!window.SupabaseClient || !window.SupabaseClient.init || !window.SupabaseClient.init()) {
                diaryCloudStatus.textContent = '⚠️ Supabase 未設定，日記僅存本機';
                return;
            }
            const sb = window.SupabaseClient.getClient();
            if (!sb) {
                diaryCloudStatus.textContent = '⚠️ 無法取得 Supabase client';
                return;
            }

            diaryCloudStatus.textContent = '☁️ 正在同步日記至雲端…';

            try {
                const charId = charSelect.value;
                const charName = charSelect.options[charSelect.selectedIndex]?.text.split(' (')[0] || charId;
                const dateStr = new Date().toISOString().split('T')[0];

                // 1. 從 Job Logs 中解析出故事檔名
                let storyFilename = null;
                const logs = jobResult.logs || '';
                const fileMatch = logs.match(/已儲存至 diaries[/\\]([^\s]+\.json)/);
                if (fileMatch) {
                    storyFilename = fileMatch[1];
                }

                if (!storyFilename) {
                    // 備援：嘗試尋找任何 符合 YYYY-MM-DD 格式的 JSON 檔名
                    const anyMatch = logs.match(/(\d{4}-\d{2}-\d{2}_[^\s]+\.json)/g);
                    if (anyMatch) storyFilename = anyMatch[anyMatch.length - 1];
                }

                if (!storyFilename) {
                    throw new Error('找不到生成的故事檔名，無法同步乾淨的內容');
                }

                // 2. 讀取本機生成的 JSON 檔案以獲取乾淨資料
                // 增加延遲以防檔案寫入未同步完成
                await new Promise(r => setTimeout(r, 2000));

                let cleanData = { story: "", full_prompt: "", image_prompt: "" };
                try {
                    // 使用 URL 編碼處理中文字檔名
                    const encodedFilename = encodeURIComponent(storyFilename);
                    const res = await fetch(`http://localhost:8000/diaries/${encodedFilename}`);
                    if (res.ok) {
                        cleanData = await res.json();
                    } else {
                        throw new Error(`伺服器回傳錯誤 (${res.status}): ${storyFilename}`);
                    }
                } catch (e) {
                    console.error('[Cloud] 讀取本機 JSON 失敗:', e);
                    throw new Error(`讀取本機故事檔案失敗: ${storyFilename} (${e.message})`);
                }

                const diaryPayload = {
                    entry_date: cleanData.date || dateStr,
                    character_id: charId || null,
                    character_name: cleanData.character_name || charName, // 使用 JSON 內真正的角色名
                    story: cleanData.story || "",
                    full_prompt: cleanData.full_prompt || "",
                    image_prompt: cleanData.image_prompt || "",
                    story_filename: storyFilename
                };

                // 執行儲存 (排除重複的 story_json 欄位)
                const { error } = await sb.from('diary_entries').insert(diaryPayload);
                if (error) {
                    if (error.message && error.message.includes('schema cache')) {
                        throw new Error('欄位不匹配或資料表架構過舊。請前往 Supabase SQL Editor 重新執行 schema_add.sql 並按下「Reload postgrest schema」');
                    }
                    throw error;
                }
                diaryCloudStatus.textContent = '✅ 日記已全數同步至雲端';
                console.log('[Cloud] diary_entries inserted with clean story content');
            } catch (err) {
                console.error('[Cloud] 日記雲端儲存失敗:', err);
                diaryCloudStatus.textContent = '❌ 日記雲端儲存失敗: ' + err.message;
            }
        }

        // ====== 執行生成 ======
        document.getElementById('run-btn').addEventListener('click', async () => {
            // 先確認伺服器在線
            if (!serverOnline) {
                const online = await checkServerStatus();
                if (!online) {
                    logBox.innerText = '❌ debug_server.py 未啟動，無法生成日記。\n\n請先點擊「🚀 啟動 debug_server.py」按鈕。';
                    return;
                }
            }

            const charId = charSelect.value;
            const scenario = document.getElementById('input-scenario').value;

            // 關係參數
            const relationship = {
                partner_status: document.getElementById('partner-status').value,
                friend_a_status: document.getElementById('friend-a-status').value,
                friend_b_status: document.getElementById('friend-b-status').value,
                others_occupied: document.getElementById('others-have-partner').checked
            };

            logBox.innerText = ">> 任務啟動...\n";
            diaryPromptBox.value = "";
            imagePromptBox.value = "";
            diaryCloudStatus.textContent = '';
            document.getElementById('run-btn').disabled = true;

            try {
                // 收集閨密資料
                const other_chars = [];
                const bestieIds = [
                    document.getElementById('bestie-a-select').value,
                    document.getElementById('bestie-b-select').value,
                    document.getElementById('bestie-c-select').value
                ];

                bestieIds.forEach(bid => {
                    if (bid) {
                        const found = cloudCharacters.find(c => c.id === bid);
                        if (found && found.card_json) {
                            other_chars.push(found.card_json);
                        }
                    }
                });

                // 如果有日期/時間，併入情境中 (讓 AI 知道具體時間點)
                const dDate = document.getElementById('diary-date').value;
                const dTime = document.getElementById('diary-time').value;
                const timeContext = `[時間設定] 日期：${dDate}，大約晚上 ${dTime} 點左右。\n`;
                const finalScenario = timeContext + scenario;

                // 如果是雲端模式，附上完整 card_json 讓 server 直接使用
                const postBody = {
                    char_id: charId,
                    scenario: finalScenario,
                    relationship: relationship,
                    other_chars: other_chars,
                    model: document.getElementById('model-select').value,
                    model_options: (window.getModelOptionsPayload && window.getModelOptionsPayload()) || null,
                    writer_settings: (window.WriterSettingsApp && window.WriterSettingsApp.getSelectedContext()) || null
                };

                let cardJson = null;
                if (!useLocalCheckbox.checked && cloudCharacters.length > 0) {
                    const cloudChar = cloudCharacters.find(c => c.id === charId);
                    if (cloudChar && cloudChar.card_json) cardJson = cloudChar.card_json;
                }

                if (cardJson) {
                    postBody.card_json = cardJson;
                }

                const res = await fetch('http://localhost:8000/api/run_async', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(postBody)
                });
                const result = await res.json();
                if (result.diary_prompt) diaryPromptBox.value = result.diary_prompt;
                if (result.image_prompt) imagePromptBox.value = result.image_prompt;

                const jobId = result.job_id;
                if (!jobId) {
                    logBox.innerText += "\n❌ 啟動失敗：未取得 job_id";
                    return;
                }

                logBox.innerText += `\nJob: ${jobId}\n`;
                let lastText = "";
                let finalJobResult = null;
                for (let i = 0; i < 600; i++) {
                    await new Promise(r => setTimeout(r, 1000));
                    const jr = await fetch(`http://localhost:8000/api/job?id=${encodeURIComponent(jobId)}`);
                    const jd = await jr.json();
                    if (jd.logs && jd.logs !== lastText) {
                        lastText = jd.logs;
                        logBox.innerText = lastText;
                        logBox.scrollTop = logBox.scrollHeight;
                    }
                    if (jd.status === 'done') {
                        logBox.innerText += "\n\n[OK] 流程完畢。您可以到首頁查看結果。";
                        finalJobResult = { jobId, logs: lastText };
                        break;
                    }
                    if (jd.status === 'error') {
                        logBox.innerText += "\n\n[ERROR] 流程失敗，請看上方錯誤訊息。";
                        break;
                    }
                }

                if (finalJobResult) {
                    await saveDiaryToCloud(finalJobResult);
                }

            } catch (e) {
                logBox.innerText += "\n❌ 連線錯誤: " + e;
            } finally {
                document.getElementById('run-btn').disabled = false;
            }
            // 監聽選單切換，即時更新個性類型顯示
            charSelect.addEventListener('change', async () => {
                const charId = charSelect.value;
                const pTypeDisplay = document.getElementById('char-personality-type-display');
                if (!charId) {
                    pTypeDisplay.style.display = 'none';
                    return;
                }

                let charData = null;
                if (useLocalCheckbox.checked) {
                    // 本機模式：從伺服器 API 抓取
                    try {
                        const res = await fetch(`http://localhost:8000/characters/${charId}.json`);
                        charData = await res.json();
                    } catch (e) {
                        console.error('Failed to load local char data');
                    }
                } else {
                    // 雲端模式：從快照中找
                    const found = cloudCharacters.find(c => c.id === charId);
                    if (found) charData = found.card_json;
                }

                if (charData && charData.personality_type) {
                    pTypeDisplay.textContent = `🧬 性格：${charData.personality_type}`;
                    pTypeDisplay.style.display = 'inline-block';
                } else {
                    pTypeDisplay.style.display = 'none';
                }
            });

        });

            }
        });

        // ====== 初始載入 ======
        (async function init() {
            // 先偵測伺服器
            await checkServerStatus();

            // 載入角色
            if (useLocalCheckbox.checked) {
                loadLocalChars();
            } else {
                loadCloudChars();
            }
        })();
    </script>
</body>
