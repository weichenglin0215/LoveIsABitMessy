<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>角色資料編輯器 - LoveIsABitMessy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/lpas_styles.css">
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 10px 20px;
      font-size: 1rem;
      box-sizing: border-box;
    }

    .debug-panel {
      max-width: 1800px;
      width: 100%;
      margin: 0 auto;
      background: var(--c-bg-card);
      padding: 20px;
      border-radius: 16px;
      border: 1px solid #444;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      flex: 1;
      min-height: 0; /* Important for flex child to be able to shrink/not overflow */
      box-sizing: border-box;
    }

    .col-left {
      border-right: 1px solid #444;
      padding-right: 20px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .col-right {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow-y: auto;
      padding-right: 5px;
    }

    .editor-header {
      max-width: 1200px;
      margin: 0 auto 10px;
      text-align: center;
    }

    .editor-header h1 {
      font-weight: 300;
      font-size: 2rem;
      margin-bottom: 5px;
    }

    /* 連線區 */
    .conn-panel {
      max-width: 1200px;
      margin: 0 auto 10px;
      background: var(--c-bg-card);
      border-radius: 16px;
      padding: 6px 12px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .conn-status {
      font-size: 1rem;
      color: var(--c-text-sec);
      /*font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;*/
      text-align: center;
    }

    .editor-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      width: 100%;
    }

    .editor-panel {
      background: var(--c-bg-card);
      border-radius: 16px;
      padding: 6px 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .editor-panel h2 {
      font-weight: 500;
      font-size: 1.2rem;
      margin-bottom: 6px;
      color: var(--c-accent-light);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .toolbar select {
      flex: 1 1 200px;
      padding: 6px 12px;
      border-radius: 10px;
      border: 1px solid var(--c-scale-empty);
      background-color: var(--c-bg-main);
      color: var(--c-text-main);
      font-family: inherit;
      font-size: 1rem;
      max-width: 440px;
    }

    .toolbar .btn {
      margin-top: 0;
      padding: 6px 12px;
      font-size: 1rem;
      white-space: nowrap;
    }

    .toolbar .btn-icon {
      background: none;
      border: none;
      color: var(--c-text-sec);
      cursor: pointer;
      font-size: 1.2rem;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .toolbar .btn-icon:hover {
      background: rgba(255, 255, 255, 0.07);
      color: var(--c-accent-light);
    }

    .editor-textarea {
      flex: 1;
      min-height: 100px;
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid var(--c-scale-empty);
      background-color: var(--c-bg-main);
      color: var(--c-text-main);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 1.1rem;
      line-height: 1.5;
      resize: none;
    }

    .editor-input {
      width: 100%;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid var(--c-scale-empty);
      background-color: var(--c-bg-main);
      color: var(--c-text-main);
      font-family: inherit;
      font-size: 1rem;
      margin-bottom: 0px;
    }

    .field-group {
      margin-bottom: 6px;
    }

    .field-label {
      display: block;
      font-size: 1rem;
      color: var(--c-text-sec);
      margin-top: 0.5rem;
      margin-bottom: 0.2rem;
      font-weight: 500;
    }

    .hint {
      font-size: 1rem;
      color: var(--c-text-sec);
      margin-top: 8px;
      opacity: 0.7;
    }
  </style>

  <!-- Supabase JS (UMD) -->
  <script src="https://unpkg.com/@supabase/supabase-js@2" defer></script>
  <!-- 中央角色資料與邏輯 -->
  <script src="js/character_logic.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/characters_editor_app.js"></script>
</head>

<body data-period="night">
  <div id="star-bg"></div>
  <div class="debug-panel">
    <div class="col-left">
      <div class="editor-header">
        <h1>🎭 角色資料編輯器</h1>
        <div style="color: var(--c-text-sec); ">管理 Supabase 雲端角色卡、生日、血型與人格特質</div>
      </div>

      <div class="conn-panel">
        <div class="conn-status" id="conn-status">🔄 正在自動連線至 Supabase…</div>
      </div>

      <div class="editor-container">
        <div class="editor-panel">
          <h2><span class="icon">🎭</span> 登場角色管理</h2>
          <div class="toolbar">
            <select id="char-dropdown">
              <option value="">-- 選擇角色卡 --</option>
            </select>
            <button class="btn-icon" id="btn-char-refresh" title="重新整理">🔄</button>
            <button class="btn primary-btn" style="background: var(--c-accent);" id="btn-char-save-new">🆕
              儲存新角色...</button>
            <button class="btn primary-btn" id="btn-char-save">💾 儲存角色(更新)</button>
          </div>

          <div class="field-group">
            <label class="field-label">角色 ID (ID) - 唯讀</label>
            <input type="text" class="editor-input" id="char-id" readonly
              style="background-color: var(--c-bg-card); opacity: 0.8;" placeholder="系統自動生成">
          </div>

          <div style="display: grid; grid-template-columns: 3fr 1fr 1fr 1fr 1fr; gap: 12px; margin-bottom: 8px;">
            <div class="field-group">
              <label class="field-label">姓名 (Name)</label>
              <input type="text" class="editor-input" id="char-name" placeholder="輸入角色姓名">
            </div>
            <div class="field-group">
              <label class="field-label">性別 (Gender)</label>
              <select class="editor-input" id="char-gender">
                <option value="女" selected>女</option>
                <option value="男">男</option>
              </select>
            </div>
            <div class="field-group">
              <label class="field-label">身高 (cm)</label>
              <input type="number" class="editor-input" id="char-height" value="165">
            </div>
            <div class="field-group">
              <label class="field-label">體重 (kg)</label>
              <input type="number" class="editor-input" id="char-weight" value="55">
            </div>
            <div class="field-group">
              <label class="field-label">上圍 (Bust)</label>
              <select class="editor-input" id="char-bust">
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C" selected>C</option>
                <option value="D">D</option>
                <option value="E">E</option>
                <option value="F">F</option>
                <option value="G">G</option>
              </select>
            </div>
          </div>

          <div style="display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 12px; margin-bottom: 8px;">
            <div class="field-group">
              <label class="field-label" id="lbl-birthday">生日 (Birthday)</label>
              <input type="date" class="editor-input" id="char-birthday">
            </div>
            <div class="field-group">
              <label class="field-label">星座 (Zodiac)</label>
              <select class="editor-input" id="char-zodiac">
                <option value="">-- 選擇星座 --</option>
              </select>
            </div>
            <div class="field-group">
              <label class="field-label">血型 (Blood Type)</label>
              <select class="editor-input" id="char-blood-type">
                <option value="">-- 選擇血型 --</option>
              </select>
            </div>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px;">
            <div class="field-group">
              <label class="field-label">曖昧期類型</label>
              <select class="editor-input" id="char-type-1" style="padding: 6px;">
                <option value="">-- 選擇曖昧期類型 --</option>
              </select>
            </div>
            <div class="field-group">
              <label class="field-label">熱戀期類型</label>
              <select class="editor-input" id="char-type-2" style="padding: 6px;">
                <option value="">-- 選擇熱戀期類型 --</option>
              </select>
            </div>
            <div class="field-group">
              <label class="field-label">失戀期類型</label>
              <select class="editor-input" id="char-type-3" style="padding: 6px;">
                <option value="">-- 選擇失戀期類型 --</option>
              </select>
            </div>
          </div>

          <div class="field-group" style="flex: 1; display:flex; flex-direction:column;">
            <label class="field-label">角色設定 JSON (Card JSON)</label>
            <textarea class="editor-textarea" id="char-card-json" placeholder="JSON 內容會顯示在此。"></textarea>
          </div>
        </div>
      </div>
      <div class="hint">💡 儲存角色時會自動同步更新 Supabase 中的 characters 資料表。</div>
    </div>
    <div class="col-right">
      <div style="margin-bottom: 15px;">
        <label class="field-label">人格特質與類型說明 (唯讀)</label>
        <div style="display: flex; flex-direction: column; gap: 8px;">
          <label class="field-label">♈♉♊♋♌♍♎♏♐♑♒♓星座說明 (唯讀🔻)</label>
          <textarea class="editor-textarea" id="desc-zodiac" readonly placeholder="星座說明"
            style="min-height: 140px; background: var(--c-bg-card);"></textarea>
          <label class="field-label">🅰🅱🆎🅾血型說明 (唯讀🔻)</label>
          <textarea class="editor-textarea" id="desc-blood" readonly placeholder="血型說明"
            style="min-height: 140px; background: var(--c-bg-card);"></textarea>
          <label class="field-label">💜曖昧期說明 (唯讀🔻)</label>
          <textarea class="editor-textarea" id="desc-type-1" readonly placeholder="曖昧期說明"
            style="min-height: 140px; background: var(--c-bg-card);"></textarea>
          <label class="field-label">🧡熱戀期說明 (唯讀🔻)</label>
          <textarea class="editor-textarea" id="desc-type-2" readonly placeholder="熱戀期說明"
            style="min-height: 140px; background: var(--c-bg-card);"></textarea>
          <label class="field-label">💔失戀期說明 (唯讀🔻)</label>
          <textarea class="editor-textarea" id="desc-type-3" readonly placeholder="失戀期說明"
            style="min-height: 140px; background: var(--c-bg-card);"></textarea>
        </div>
      </div>
    </div>
  </div>

  <div style="margin: 10px auto 0; text-align: center;">
    <div style="color: var(--c-text-sec); opacity: 0.8; font-size: 0.9rem;">
      LoveIsABitMessy Character Management System
    </div>
  </div>
</body>

</html>
