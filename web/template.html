<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ character_name }} 的辦公室日常 - LoveIsABitMessy</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/lpas_styles.css">
<style>
body { background-color: var(--c-bg-main); padding: 40px 20px; flex-direction: column; height: auto; overflow: visible; display: block;}
.story-card { background: var(--c-bg-card); max-width: 600px; margin: 0 auto; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.story-img-container { width: 100%; aspect-ratio: 16/9; background-color: var(--c-scale-empty); overflow: hidden; display: flex; align-items: center; justify-content: center;}
.story-image { width: 100%; height: 100%; object-fit: cover; }
.story-content { padding: 32px; color: var(--c-text-main); }
.story-date { color: var(--c-accent-light); font-size: 0.95rem; margin-bottom: 20px; text-align: center; letter-spacing: 2px;}
.story-text { line-height: 1.8; text-align: justify; white-space: pre-wrap; font-size: 1.05rem;}
.back-link { display: block; text-align: center; margin-top: 40px; color: var(--c-text-sec); text-decoration: none; font-size: 0.9rem;}
.back-link:hover { color: var(--c-accent); }
</style>
</head>
<body>
    <div class="story-card">
        <div class="story-img-container">
            <img src="images/{{ image_filename }}" alt="{{ character_name }} 的照片" class="story-image" onerror="this.src='https://via.placeholder.com/800x450/3A2860/E8E0F5?text=Image+Generating'">
        </div>
        <div class="story-content">
            <div class="story-date">{{ date }}</div>
            <div class="story-text">{{ story }}</div>
        </div>
    </div>
    <a href="index.html" class="back-link">← 返回全部故事列表</a>
</body>
</html>
