<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小說自動產生器 - LoveIsABitMessy</title>
  <link rel="stylesheet" href="css/lpas_styles.css">
  <!-- Supabase JS (UMD) -->
  <script src="https://unpkg.com/@supabase/supabase-js@2" defer></script>
  <script src="js/supabaseClient.js" defer></script>
  <style>
    :root {
      --c-bg-panel: hsla(240, 0%, 10%, 0.85);
      --c-border: hsla(266, 0%, 64%, 0.3);
      --c-accent-glow: hsla(266, 0%, 64%, 0.6);
    }

    body {
      background: #0d0d12 url('https://w.wallhaven.cc/full/8o/wallhaven-8o9m6j.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #e0e0e0;
      font-family: 'Inter', 'Noto Sans TC', sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
    }

    /* Glassmorphism Background Overlay */
    #glass-overlay {
      position: fixed;
      inset: 0;
      background: hsla(0, 0%, 0%, 0.6);
      backdrop-filter: blur(8px);
      z-index: -1;
    }

    /* Layout structure */
    .app-container {
      display: grid;
      grid-template-columns: 280px 1fr 400px;
      grid-template-rows: 60px 1fr;
      height: 100vh;
      gap: 10px;
      padding: 10px;
      box-sizing: border-box;
    }

    /*標題*/
    header {
      grid-column: 1 / 4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--c-bg-panel);
      padding: 0 20px;
      border-radius: 12px;
      border: 1px solid var(--c-border);
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(45deg, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Columns */
    .col {
      background: var(--c-bg-panel);
      border-radius: 12px;
      border: 1px solid var(--c-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(4px);
    }

    .col-header {
      padding: 15px;
      border-bottom: 1px solid var(--c-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.05);
    }

    .col-header h3 {
      margin: 0;
      font-size: 1.2rem;
      letter-spacing: 0.2rem;
      color: #fff;
    }

    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    /* Left Column: Characters 左側角色卡*/
    .char-card {
      letter-spacing: 0.1rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      position: relative;
    }

    .char-mode-toggle {
      padding: 10px;
      border-bottom: 1px solid var(--c-border);
      font-size: 0.85rem;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .char-card select {
      font-size: 1.0rem;
      width: 100%;
      background: #111;
      color: #fff;
      border: 1px solid #444;
      padding: 8px;
      border-radius: 4px;
    }

    /* Middle Column: Story Structure */
    .chapter-card {
      background: rgba(156, 111, 214, 0.05);
      border: 1px solid var(--c-border);
      border-radius: 10px;
      margin-bottom: 20px;
      padding: 15px;
    }

    .chapter-title-row {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
    }

    .chapter-title-row input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid #666;
      color: #fff;
      font-size: 1.1rem;
      padding: 5px;
    }

    .chapter-desc {
      width: 100%;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      color: #aaa;
      font-size: 0.9rem;
      padding: 8px;
      margin-bottom: 12px;
      resize: vertical;
      min-height: 60px;
      font-family: inherit;
    }

    .section-list {
      margin-left: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .section-item {
      display: flex;
      gap: 8px;
      align-items: center;
      background: rgba(255, 255, 255, 0.02);
      padding: 8px;
      border-radius: 6px;
      border: 1px solid transparent;
      transition: all 0.2s;
    }

    .section-item.active {
      border-color: var(--c-accent-light);
      background: rgba(156, 111, 214, 0.1);
    }

    .section-item input {
      flex: 1;
      background: transparent;
      border: none;
      color: #ccc;
      font-size: 1.0rem;
    }

    .btn-del-sec {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 1.1rem;
    }
    .btn-del-sec:hover { color: #f44; }

    /* Buttons */
    .btn-circle {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid var(--c-border);
      background: rgba(156, 111, 214, 0.2);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
    }

    .btn-circle:hover {
      background: var(--c-accent-light);
      color: #000;
    }

    .ai-btn {
      padding: 4px 12px;
      border-radius: 15px;
      border: 1px solid #f472b6;
      background: rgba(244, 114, 182, 0.1);
      color: #f472b6;
      font-size: 1.0rem;
      cursor: pointer;
    }

    .ai-btn:hover {
      background: #f472b6;
      color: #fff;
    }

    /* Right Column: Editor */
    .editor-container {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .editor-title {
      font-size: 1.2rem;
      margin-bottom: 10px;
      color: var(--c-accent-light);
    }

    textarea#main-editor {
      flex: 1;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--c-border);
      border-radius: 8px;
      color: #f0f0f0;
      padding: 20px;
      font-size: 1.0rem;
      line-height: 1.6;
      resize: none;
      outline: none;
    }

    /* Toolbox */
    .toolbox {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.1);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--c-border);
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <div id="glass-overlay"></div>

  <div class="app-container">
    <header>
      <div class="logo">✨ 小說自動產生器 <small style="font-size: 1.0rem; opacity: 0.6;">v1.0</small></div>
      <div class="global-actions">
        <button class="btn secondary-btn" id="btn-load">📂 讀取專案</button>
        <button class="btn primary-btn" id="btn-save">💾 儲存專案</button>
      </div>
    </header>

    <!-- 角色挑選 -->
    <div class="col">
      <div class="col-header">
        <h3>🎭 登場角色</h3>
        <button class="btn-circle" id="add-char" title="增加角色">+</button>
      </div>
      <div class="scroll-area" id="char-list">
        <div class="char-mode-toggle">
          <label style="display:flex; align-items:center; gap:5px; cursor:pointer;">
            <input type="checkbox" id="use-local-data"> 讀取本機資料 (除除用)
          </label>
          <div id="char-source-status" style="font-size:0.75rem; color:#aaa;">☁️ 預設讀取雲端角色卡</div>
        </div>
        <div id="char-slots-container">
          <!-- JS 動態生成 -->
        </div>
      </div>
    </div>

    <!-- 故事大綱 -->
    <div class="col">
      <div class="col-header">
        <h3>📖 故事大綱 / 章節設計</h3>
        <button class="btn-circle" id="add-chapter" title="增加章節">+</button>
      </div>
      <div class="scroll-area" id="chapter-list">
        <!-- JS 動態生成 -->
      </div>
    </div>

    <!-- 編輯器 -->
    <div class="col">
      <div class="col-header">
        <h3>🖋️ 內文編輯器</h3>
      </div>
      <div class="scroll-area editor-container" id="editor-side">
        <div class="editor-title" id="active-section-title">請選擇一個章節開始</div>
        <textarea id="main-editor" placeholder="在此編寫故事內容..."></textarea>
        <div class="toolbox">
          <button class="btn primary-btn" id="btn-ai-gen-content">🤖 AI 產生本節小說</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/generate_story_app.js" defer></script>
</body>

</html>
