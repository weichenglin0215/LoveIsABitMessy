<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LPAS - 你是哪一種愛情人格？ - LoveIsABitMessy</title>
    <!-- 引入 Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <link rel="stylesheet" href="css/lpas_styles.css">
    <!-- 中央角色資料與邏輯 -->
    <script src="js/character_logic.js" defer></script>
    <script src="js/lpas_questions.js" defer></script>
    <script src="js/lpas_scoring.js" defer></script>
    <script src="js/characters_generator.js" defer></script>
    <!-- Supabase JS (UMD) -->
    <script src="https://unpkg.com/@supabase/supabase-js@2" defer></script>
    <script src="js/supabaseClient.js" defer></script>
    <script src="js/lpas_app.js" defer></script>
    <link rel="stylesheet" href="css/responsive.css">
    <script src="js/responsive.js" defer></script>
</head>

<body data-period="night">
    <!-- 星點背景特效容器 -->
    <div id="star-bg"></div>



    <main id="app-container" class="aspect-5-8">
        <!-- 音樂控制 (左下角) -->
        <div id="music-control">
            <span class="music-icon">🎵</span>
        </div>
        <div class="debug-frame"></div>
        <!-- 1. 首頁 (Landing Page) -->
        <section id="screen-landing" class="screen active">
            <h1 class="main-title">你在感情裡是哪一種人？</h1>
            <h2 class="sub-title">一份關於你在愛情裡真實樣子的測驗</h2>
            <div class="desc-text">60題 / 三個情境 / 約8分鐘</div>
            <button class="btn primary-btn" onclick="app.showScreen('screen-basic-info')">開始測驗</button>
            <div class="footer-note">本測驗資料全匿名，不收集個人識別資訊</div>
        </section>

        <!-- 2. 基本資料頁 -->
        <section id="screen-basic-info" class="screen">
            <div class="form-container">
                <h2>基本資料</h2>
                <div class="form-group">
                    <label>匿名代號</label>
                    <input type="text" id="input-alias" placeholder="例如：月亮上的貓">
                </div>
                <div class="form-group">
                    <label>年齡區間</label>
                    <div class="radio-group" id="group-age">
                        <button class="radio-btn" data-val="18-">18以下</button>
                        <button class="radio-btn" data-val="18-22">18-22</button>
                        <button class="radio-btn" data-val="23-27">23-27</button>
                        <button class="radio-btn" data-val="28-32">28-32</button>
                        <button class="radio-btn" data-val="33-37">33-37</button>
                        <button class="radio-btn" data-val="38+">38+</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>是否有過感情經驗</label>
                    <div class="radio-group" id="group-exp">
                        <button class="radio-btn" data-val="yes">是</button>
                        <button class="radio-btn" data-val="no">目前還沒有</button>
                    </div>
                </div>
                <div class="note">以上資料完全匿名，僅用於統計分析</div>
                <button class="btn secondary-btn submit-info-btn">下一步</button>
            </div>
        </section>

        <!-- 3. 作答說明頁 (3段) -->
        <section id="screen-instructions" class="screen">
            <div class="instruction-content">
                <p id="instruction-text"></p>
                <button class="btn secondary-btn" id="next-instruction-btn">繼續</button>
            </div>
        </section>

        <!-- 4. 時期切換頁 -->
        <section id="screen-transition" class="screen">
            <h2 id="transition-text" class="fade-text"></h2>
        </section>

        <!-- 5. 作答頁 -->
        <section id="screen-question" class="screen">
            <div class="top-bar">
                <span id="period-label">初期曖昧</span>
                <span id="progress-text">1/60</span>
            </div>
            <div class="question-container">
                <h2 id="question-text"></h2>
            </div>
            <div class="options-container">
                <div class="likert-scale" id="likert-scale">
                    <!-- JS 動態生成 7 個圓圈 -->
                </div>
                <div class="scale-labels-bottom">
                    <span class="scale-label">←🙁不同意</span>
                    <span class="scale-label">同意😀→</span>
                </div>
            </div>
            <button class="text-btn back-btn" id="prev-question-btn">上一題</button>
        </section>

        <!-- 6. 計算中頁面 -->
        <section id="screen-calculating" class="screen">
            <div class="calculating-anim"></div>
            <h2 class="fade-text">正在找到你的樣子……</h2>
        </section>

        <!-- 7. 結果頁 -->
        <section id="screen-result" class="screen screen-result">
            <div class="result-container">
                <!-- 新增：階段標題 -->
                <div id="result-period-header" class="result-period-header">
                    <span class="period-dot active"></span>
                    <h2 id="result-period-title">初期曖昧</h2>
                </div>
                <div id="result-type-short" class="result-type-short"></div>

                <div id="result-type-info">
                    <span id="result-type-code" class="type-badge"></span>
                    <span id="result-type-name" class="type-name"></span>
                </div>


                <!-- 滾動說明區域 -->
                <div class="result-description-wrapper">
                    <div class="result-radar">
                        <canvas id="radarChart"></canvas>
                    </div>
                    <div class="result-description" id="result-desc">
                        <!-- 動態載入結果說明 -->
                    </div>
                </div>

                <!-- 新增：星星評分區塊 -->
                <div id="feedback-section" class="feedback-section">
                    <p class="feedback-q">你覺得準確嗎？</p>
                    <div class="star-rating" id="star-rating">
                        <div class="feedback-labels">
                            <span>🙁不準</span>
                        </div>
                        <span class="star" data-val="1">★</span>
                        <span class="star" data-val="2">★</span>
                        <span class="star" data-val="3">★</span>
                        <span class="star" data-val="4">★</span>
                        <span class="star" data-val="5">★</span>
                        <div class="feedback-labels">
                            <span>😀好準！</span>
                        </div>
                    </div>

                </div>

                <!-- 最終行動按鈕 (初始隱藏) -->
                <div class="result-actions" id="final-actions" style="display: none;">
                    <button class="btn primary-btn" id="download-json-btn">下載角色卡</button>
                    <button class="btn primary-btn" id="download-record-btn">下載測驗紀錄</button>
                    <button class="btn text-btn" id="download-md-btn">以Markdown格式複製角色卡</button>
                </div>


            </div>
            <div id="cloud-save-status" style="font-size: 0.85rem; color: var(--c-text-sec); text-align: center;">
                ☁️
                準備同步至雲端…</div>
        </section>
    </main>
</body>

</html>
