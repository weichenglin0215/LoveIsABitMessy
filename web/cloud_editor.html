<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoveIsABitMessy 雲端資料編輯器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/lpas_styles.css">
  <style>
    body {
      overflow-y: auto;
      height: auto;
      align-items: flex-start;
      display: block;
      padding: 20px;
    }

    .editor-header {
      max-width: 1400px;
      margin: 0 auto 20px;
      text-align: center;
    }

    .editor-header h1 {
      font-weight: 300;
      font-size: 2rem;
      margin-bottom: 8px;
    }

    /* 連線區 */
    .conn-panel {
      max-width: 1400px;
      margin: 0 auto 20px;
      background: var(--c-bg-card);
      border-radius: 16px;
      padding: 16px 20px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .conn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .conn-row>div {
      flex: 1 1 200px;
    }

    .conn-row label {
      display: block;
      font-size: 0.85rem;
      color: var(--c-text-sec);
      margin-bottom: 4px;
    }

    .conn-row input {
      width: 100%;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--c-scale-empty);
      background-color: var(--c-bg-main);
      color: var(--c-text-main);
      font-family: inherit;
      font-size: 0.9rem;
    }

    .conn-status {
      font-size: 0.85rem;
      color: var(--c-text-sec);
      margin-top: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    /* 雙欄佈局 */
    .editor-columns {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 900px) {
      .editor-columns {
        grid-template-columns: 1fr;
      }
    }

    .editor-panel {
      background: var(--c-bg-card);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      display: flex;
      flex-direction: column;
    }

    .editor-panel h2 {
      font-weight: 500;
      font-size: 1.2rem;
      margin-bottom: 12px;
      color: var(--c-accent-light);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .editor-panel h2 .icon {
      font-size: 1.3rem;
    }

    /* 下拉選單 + 按鈕列 */
    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .toolbar select {
      flex: 1 1 200px;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid var(--c-scale-empty);
      background-color: var(--c-bg-main);
      color: var(--c-text-main);
      font-family: inherit;
      font-size: 0.9rem;
    }

    .toolbar .btn {
      margin-top: 0;
      padding: 8px 18px;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .toolbar .btn-icon {
      background: none;
      border: none;
      color: var(--c-text-sec);
      cursor: pointer;
      font-size: 1.2rem;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .toolbar .btn-icon:hover {
      background: rgba(255, 255, 255, 0.07);
      color: var(--c-accent-light);
    }

    /* 編輯框 */
    .editor-textarea {
      flex: 1;
      min-height: 400px;
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid var(--c-scale-empty);
      background-color: var(--c-bg-main);
      color: var(--c-text-main);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 1.2rem;
      line-height: 1.5;
      resize: vertical;
      white-space: pre-wrap;
      /* 支援自動換行 */
      tab-size: 2;
    }

    .editor-input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--c-scale-empty);
      background-color: var(--c-bg-main);
      color: var(--c-text-main);
      font-family: inherit;
      font-size: 0.9rem;
      margin-bottom: 12px;
    }

    .field-group {
      margin-bottom: 15px;
    }

    .field-label {
      display: block;
      font-size: 0.85rem;
      color: var(--c-text-sec);
      margin-bottom: 5px;
      font-weight: 500;
    }

    .editor-textarea:focus {
      outline: none;
      border-color: var(--c-accent);
      box-shadow: 0 0 0 2px rgba(156, 111, 214, 0.2);
    }

    /* 小提示 */
    .hint {
      font-size: 0.8rem;
      color: var(--c-text-sec);
      margin-top: 8px;
      opacity: 0.7;
    }
  </style>

  <!-- Supabase JS (UMD) -->
  <script src="https://unpkg.com/@supabase/supabase-js@2" defer></script>
  <script src="js/supabaseClient.js" defer></script>
  <script src="js/scoring.js" defer></script>
  <script src="js/profile_generator.js" defer></script>
  <script src="js/cloud_editor_app.js" defer></script>
</head>

<body data-period="night">
  <div id="star-bg"></div>

  <!-- 標題 -->
  <div class="editor-header">
    <h1>☁️ 雲端資料編輯器</h1>
    <div style="color: var(--c-text-sec); font-size: 0.9rem;">手動編輯 Supabase 雲端資料：角色卡、角色卡答題過程、日記</div>
  </div>

  <!-- 連線狀態 -->
  <div class="conn-panel">
    <div class="conn-status" id="conn-status">🔄 正在自動連線至 Supabase…</div>
  </div>

  <!-- 隱藏的備援欄位（供 JS 存取，不顯示） -->
  <input type="hidden" id="auth-email"><input type="hidden" id="auth-pass">
  <input type="hidden" id="sb-url"><input type="hidden" id="sb-anon">
  <button id="btn-login" style="display:none;"></button>
  <button id="btn-logout" style="display:none;"></button>

  <!-- 雙欄編輯區 -->
  <div class="editor-columns">
    <!-- 左欄：角色卡 -->
    <div class="editor-panel">
      <h2><span class="icon">🎭</span> 角色卡（包括角色卡答題過程）</h2>
      <div class="toolbar">
        <select id="char-dropdown">
          <option value="">-- 選擇角色卡 --</option>
        </select>
        <button class="btn-icon" id="btn-char-refresh" title="重新整理">🔄</button>
        <button class="btn secondary-btn" id="btn-char-cancel">取消</button>
        <button class="btn primary-btn" id="btn-char-save">儲存</button>
      </div>
      <div class="field-group">
        <label class="field-label">角色 ID (ID) - 唯讀（隨姓名與特質更動自動更新）</label>
        <input type="text" class="editor-input" id="char-id" readonly style="background-color: var(--c-bg-card); opacity: 0.8;" placeholder="系統自動生成">
      </div>
      <div class="field-group">
        <label class="field-label">姓名 (Name)</label>
        <input type="text" class="editor-input" id="char-name" placeholder="輸入角色姓名">
      </div>

      <div style="display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 12px; margin-bottom: 8px;">
        <div class="field-group">
          <label class="field-label">生日 (Birthday)</label>
          <input type="date" class="editor-input" id="char-birthday">
        </div>
        <div class="field-group">
          <label class="field-label">星座 (Zodiac)</label>
          <select class="editor-input" id="char-zodiac">
            <option value="">-- 選擇星座 --</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">血型 (Blood Type)</label>
          <select class="editor-input" id="char-blood-type">
            <option value="">-- 選擇血型 --</option>
          </select>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px;">
        <div class="field-group">
          <label class="field-label">曖昧期類型</label>
          <select class="editor-input" id="char-type-1" style="font-size: 0.8rem; padding: 6px;">
            <option value="">-- 選擇曖昧期類型 --</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">熱戀期類型</label>
          <select class="editor-input" id="char-type-2" style="font-size: 0.8rem; padding: 6px;">
            <option value="">-- 選擇熱戀期類型 --</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">失戀期類型</label>
          <select class="editor-input" id="char-type-3" style="font-size: 0.8rem; padding: 6px;">
            <option value="">-- 選擇失戀期類型 --</option>
          </select>
        </div>
      </div>

      <div class="field-group" style="flex: 1; display:flex; flex-direction:column;">
        <label class="field-label">角色設定 JSON (Card JSON)</label>
        <textarea class="editor-textarea" id="char-card-json" placeholder="JSON 內容會顯示在此。支援自動換行。"></textarea>
      </div>

      <div style="margin-bottom: 15px;">
        <label class="field-label">類型與特質說明 (唯讀)</label>
        <div style="display: flex; flex-direction: column; gap: 8px;">
          <textarea class="editor-textarea" id="desc-zodiac" readonly placeholder="星座說明"
            style="min-height: 160px; font-size: 1rem; background: var(--c-bg-card);"></textarea>
          <textarea class="editor-textarea" id="desc-blood" readonly placeholder="血型說明"
            style="min-height: 160px; font-size: 1rem; background: var(--c-bg-card);"></textarea>
          <textarea class="editor-textarea" id="desc-type-1" readonly placeholder="曖昧期說明"
            style="min-height: 160px; font-size: 1rem; background: var(--c-bg-card);"></textarea>
          <textarea class="editor-textarea" id="desc-type-2" readonly placeholder="熱戀期說明"
            style="min-height: 160px; font-size: 1rem; background: var(--c-bg-card);"></textarea>
          <textarea class="editor-textarea" id="desc-type-3" readonly placeholder="失戀期說明"
            style="min-height: 160px; font-size: 1rem; background: var(--c-bg-card);"></textarea>
        </div>
      </div>

      <div class="hint">💡 儲存時會自動依照 ID 進行 upsert (存在則更新，不存在則新增)。</div>
    </div>

    <!-- 右欄：日記 -->
    <div class="editor-panel">
      <h2><span class="icon">📖</span> 日記</h2>
      <div class="toolbar">
        <select id="diary-dropdown">
          <option value="">-- 選擇日記 --</option>
        </select>
        <button class="btn-icon" id="btn-diary-refresh" title="重新整理">🔄</button>
        <button class="btn secondary-btn" id="btn-diary-cancel">取消</button>
        <button class="btn primary-btn" id="btn-diary-save">儲存</button>
      </div>
      <textarea class="editor-textarea" id="diary-editor" placeholder="選擇日記後，JSON 內容會顯示在此。可直接編輯後按下「儲存」。"></textarea>
      <div class="hint">💡 編輯 story 欄位修改日記內容。entry_date 為日期，character_id 為關聯角色。</div>
    </div>
  </div>

  <div style="max-width: 1400px; margin: 20px auto; text-align: center;">
    <div style="color: var(--c-text-sec); font-size: 0.8rem; opacity: 0.6;">
      資料存取受 Supabase RLS 政策控管。匿名模式下可讀寫已開放的表。
    </div>
  </div>
</body>

</html>
